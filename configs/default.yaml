model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 256
  dropout: 0.1

training:
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  num_epochs: 200
  warmup_epochs: 5
  restart_period: 0
  patience: 40

  # Cross-entropy weight on "hard" events (true ISR is not the lowest-pT jet).
  # Easy events (ISR == softest jet) are trivially solvable by pT-rank; upweighting
  # the hard cases forces the model to rely on angular structure rather than
  # plateauing at the easy-case ceiling.  At alpha=2 the model still found the
  # pT-rank shortcut (~91% easy / ~5% hard); 8.0 makes hard events dominate
  # the gradient strongly enough to break out of that local minimum.
  hard_case_alpha: 8.0

  # Contrastive single-swap InfoNCE: pushes truth above the 15 single-swap
  # neighbour hypotheses.  These are the hardest negatives (differ from truth
  # by one jet identity) so they give much more signal than uniform-negative CE.
  lambda_contrast: 1.0
  lambda_contrast_rampup: 0

  # Pair-symmetric mass-asymmetry auxiliary (mild).  Regression-only, applied
  # to the truth logit so it steers the scorer toward mass-balanced assignments
  # without reweighting softmax (which would kill hard events with asymmetric
  # truth).
  lambda_pair_sym: 0.05

  # ISR-aux BCE: per-jet "is this the ISR?" head.  Not a separate scorer head,
  # just an auxiliary supervision signal that helps the backbone learn
  # ISR-discriminating features.
  lambda_isr_aux: 0.5
  lambda_isr_aux_rampup: 0

  # Mass-adversarial decorrelation (kept off by default for single-mass data).
  lambda_adv: 0.0
  lambda_adv_rampup: 50

data:
  normalize_by_ht: true
  num_jets: 7
  pt_smear_frac: 0.0
