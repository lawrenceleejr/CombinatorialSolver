model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 256
  dropout: 0.1

training:
  batch_size: 256
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  num_epochs: 200
  warmup_epochs: 15
  restart_period: 30
  patience: 40
  lambda_adv: 0.0
  lambda_adv_rampup: 50
  tf_start: 1.0
  tf_end: 0.3
  tf_decay_epochs: 100
  lambda_sym: 0.1

data:
  normalize_by_ht: true
  num_jets: 7
  pt_smear_frac: 0.0
  use_constituents: true
