model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.2

training:
  batch_size: 256
  learning_rate: 3.0e-4
  isr_lr_multiplier: 3.0
  weight_decay: 5.0e-4
  num_epochs: 200
  warmup_epochs: 5
  restart_period: 50
  patience: 40
  lambda_adv: 0.0
  lambda_adv_rampup: 50
  tf_start: 1.0
  tf_end: 0.1
  tf_decay_epochs: 150
  # Upweights the ISR classification loss relative to the teacher-forced grouping loss.
  # Root cause: signal jets receive gradient from loss_grp_tf via all 10 groupings (10
  # gradient paths per signal jet), while the ISR jet receives gradient only from loss_isr
  # (1 path).  Setting lambda_isr=3 partially compensates for this imbalance without
  # over-dominating the grouping signal.  Tune upward (e.g. 5-10) if ISR still plateaus.
  lambda_isr: 3.0
  lambda_sym: 0.05
  lambda_sym_rampup: 20
  lambda_qcd: 0.1
  lambda_qcd_rampup: 20
  # Label smoothing for all CrossEntropyLoss calls (flat, ISR, grouping).
  # Prevents overconfidence (entropy collapse): at epoch 80+ val_loss was rising
  # while val_acc was flat, indicating the model was assigning high probability
  # to correct predictions without improving on wrong ones.  0.1 is a standard
  # value that retains most of the hard-target signal while adding a soft floor.
  label_smoothing: 0.1

data:
  normalize_by_ht: true
  num_jets: 7
  pt_smear_frac: 0.05
