model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.2

training:
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 5.0e-4
  num_epochs: 200
  warmup_epochs: 5
  restart_period: 50
  patience: 40
  lambda_adv: 0.0
  lambda_adv_rampup: 50
  # Mass-symmetry auxiliary loss: expected |m1-m2|/(m1+m2) over the assignment
  # probability distribution.  Raised from 0.05 to 0.2 because in the new flat
  # architecture mass equality is the primary physics signal — the pair_diff
  # embedding feature already encodes this, but an explicit loss term guides the
  # model faster toward symmetric solutions.
  lambda_sym: 0.2
  lambda_sym_rampup: 20
  lambda_qcd: 0.1
  lambda_qcd_rampup: 20
  # Label smoothing for CrossEntropyLoss — prevents overconfidence (entropy collapse).
  label_smoothing: 0.1

data:
  normalize_by_ht: true
  num_jets: 7
  pt_smear_frac: 0.05
